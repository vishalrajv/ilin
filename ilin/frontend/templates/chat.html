{% extends "base.html" %}
{% block title %}ILIN - Chat{% endblock %}
{% block content %}
<div class="d-flex vh-100 bg-light text-dark overflow-hidden" x-data="chatApp()" x-init="init()">
    <!-- Sidebar -->
    <aside class="bg-white border-end d-flex flex-column shadow-sm transition-all" style="width: 280px;">
        <div class="p-4 border-bottom d-flex align-items-center gap-3">
            <div class="bg-primary text-white rounded d-flex align-items-center justify-center fw-bold shadow-sm" style="width: 32px; height: 32px;">I</div>
            <h2 class="h5 fw-bold mb-0">ILIN</h2>
        </div>
        
        <nav class="flex-grow-1 overflow-auto p-3">
            <div class="list-group list-group-flush border-0">
                <button 
                    @click="section = 'topics'" 
                    class="list-group-item list-group-item-action d-flex align-items-center gap-3 border-0 rounded mb-1 transition-all"
                    :class="section === 'topics' ? 'active bg-primary text-white fw-medium' : 'text-secondary'"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <span>Knowledge Bases</span>
                </button>
                <button 
                    @click="section = 'history'; loadHistory()" 
                    class="list-group-item list-group-item-action d-flex align-items-center gap-3 border-0 rounded mb-1 transition-all"
                    :class="section === 'history' ? 'active bg-primary text-white fw-medium' : 'text-secondary'"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span>Recent Inquiries</span>
                </button>
            </div>
        </nav>

        <div class="p-3 border-top">
            <button onclick="logout()" class="btn btn-light w-100 text-start d-flex align-items-center gap-3 text-danger border-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span>Disconnect</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex flex-column position-relative bg-light">
        <!-- Topics View -->
        <template x-if="section === 'topics' && !currentTopic">
            <div class="flex-grow-1 overflow-auto p-4 p-md-5">
                <div class="container-fluid max-w-5xl">
                    <div class="mb-5">
                        <h1 class="display-6 fw-bold mb-2">Intelligence Hub</h1>
                        <p class="text-secondary fs-5">Select a knowledge base to initiate a local intelligence query.</p>
                    </div>
                    
                    <div class="row g-4">
                        <template x-for="topic in topics" :key="topic.id">
                            <div class="col-md-6 col-lg-4">
                                <div 
                                    @click="openTopic(topic)" 
                                    class="card h-100 border-0 shadow-sm rounded-4 cursor-pointer text-decoration-none transition-all card-hover"
                                >
                                    <div class="card-body p-4">
                                        <div class="bg-light rounded p-3 mb-3 d-inline-flex text-primary">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                                            </svg>
                                        </div>
                                        <h3 class="h5 fw-bold mb-2 text-dark" x-text="topic.name"></h3>
                                        <p class="text-secondary small mb-4 text-truncate-2" x-text="topic.description || 'Access intelligence indexed across multiple documents.'"></p>
                                        <div class="d-flex align-items-center gap-2 small text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">
                                            <span class="badge bg-light text-secondary border px-2 py-1" x-text="`${topic.document_count} Docs`"></span>
                                            <span class="bg-secondary rounded-circle" style="width: 4px; height: 4px;"></span>
                                            <span>Indexed Node</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Chat View -->
        <template x-if="currentTopic">
            <div class="d-flex flex-column h-100 bg-light w-100">
                <!-- Chat Header -->
                <header class="bg-white border-bottom px-4 py-3 d-flex align-items-center justify-content-between sticky-top z-1">
                    <div class="d-flex align-items-center gap-3">
                        <button @click="backToTopics()" class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <div>
                            <h2 class="h6 fw-bold mb-0 text-dark" x-text="currentTopic.name"></h2>
                            <p class="small text-primary fw-semibold text-uppercase mb-0 d-flex align-items-center gap-1" style="font-size: 0.7rem;">
                                <span class="spinner-grow text-primary spinner-grow-sm" role="status" aria-hidden="true" style="width: 0.5rem; height: 0.5rem;"></span>
                                Active Node Session
                            </p>
                        </div>
                    </div>
                </header>

                <!-- Messages -->
                <div class="flex-grow-1 overflow-auto p-4" id="messages-container">
                    <div class="container max-w-4xl mx-auto py-3">
                        <template x-for="(msg, index) in messages" :key="index">
                            <div class="d-flex align-items-start gap-3 mb-4" :class="msg.role === 'user' ? 'flex-row-reverse' : ''">
                                <div class="rounded-circle d-flex flex-shrink-0 align-items-center justify-content-center fw-bold shadow-sm"
                                     style="width: 40px; height: 40px;"
                                     :class="msg.role === 'user' ? 'bg-primary text-white' : 'bg-white text-primary border'">
                                    <span x-text="msg.role === 'user' ? 'U' : 'AI'"></span>
                                </div>
                                <div :class="msg.role === 'user' ? 'text-end' : ''" style="max-width: 80%;">
                                    <div class="d-inline-block p-3 rounded-4 shadow-sm text-start"
                                         :class="msg.role === 'user' ? 'bg-primary text-white' : 'bg-white text-dark border'">
                                        <div class="mb-0" style="white-space: pre-wrap;" x-text="msg.content"></div>
                                        
                                        <!-- Sources -->
                                        <template x-if="msg.sources && msg.sources.length > 0">
                                            <div class="mt-3 pt-3 border-top" :class="msg.role === 'user' ? 'border-light-subtle' : ''">
                                                <details class="small">
                                                    <summary class="fw-semibold cursor-pointer d-flex align-items-center gap-1" :class="msg.role === 'user' ? 'text-light' : 'text-primary'">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                                                        </svg>
                                                        Reference Intelligence (<span x-text="msg.sources.length"></span>)
                                                    </summary>
                                                    <div class="mt-2 d-flex flex-column gap-2">
                                                        <template x-for="source in msg.sources">
                                                            <div class="p-2 rounded bg-opacity-10 border text-start" :class="msg.role === 'user' ? 'bg-light border-light-subtle' : 'bg-light border-light-subtle'">
                                                                <div class="fw-bold mb-1" :class="msg.role === 'user' ? 'text-light' : 'text-primary'" x-text="`${source.source_file}${source.page_number ? ` (p.${source.page_number})` : ''}`"></div>
                                                                <div class="font-italic small" :class="msg.role === 'user' ? 'text-white-50' : 'text-secondary'" x-text="source.text"></div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </details>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                        
                        <!-- Typing Indicator -->
                        <template x-if="isStreaming">
                            <div class="d-flex align-items-start gap-3 mb-4">
                                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm bg-white text-primary border" style="width: 40px; height: 40px;">
                                    AI
                                </div>
                                <div>
                                    <div class="d-inline-block p-3 rounded-4 shadow-sm bg-white text-dark border">
                                        <div class="d-flex gap-1 py-1">
                                            <span class="spinner-grow text-secondary spinner-grow-sm" role="status" style="width: 0.4rem; height: 0.4rem;"></span>
                                            <span class="spinner-grow text-secondary spinner-grow-sm" role="status" style="width: 0.4rem; height: 0.4rem; animation-delay: 0.2s;"></span>
                                            <span class="spinner-grow text-secondary spinner-grow-sm" role="status" style="width: 0.4rem; height: 0.4rem; animation-delay: 0.4s;"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="p-3 bg-white border-top shadow-sm z-1">
                    <div class="container max-w-4xl mx-auto position-relative">
                        <textarea 
                            x-model="userInput" 
                            @keydown.enter.prevent="sendMessage()" 
                            placeholder="Inquire with the Node..." 
                            rows="1" 
                            class="form-control form-control-lg pe-5 py-3 rounded-4 bg-light"
                            style="resize: none;"
                            :disabled="isStreaming"
                        ></textarea>
                        <button 
                            @click="sendMessage()" 
                            class="btn btn-primary position-absolute rounded-circle shadow-sm d-flex align-items-center justify-content-center p-0"
                            style="right: 20px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px;"
                            :disabled="!userInput.trim() || isStreaming"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </button>
                    </div>
                    <p class="text-center text-muted small text-uppercase fw-semibold mt-2 mb-0" style="font-size: 0.65rem;">Local Inference Engine &bull; ILIN Integrated Intelligence</p>
                </div>
            </div>
        </template>

        <!-- History View -->
        <template x-if="section === 'history'">
            <div class="flex-grow-1 overflow-auto p-4 p-md-5">
                <div class="container-fluid max-w-4xl">
                    <h1 class="display-6 fw-bold mb-4">Intelligence Logs</h1>
                    <div class="d-flex flex-column gap-3">
                        <template x-for="session in history" :key="session.id">
                            <div @click="loadSession(session.id)" class="card border-0 shadow-sm rounded-4 cursor-pointer text-decoration-none transition-all card-hover group">
                                <div class="card-body p-4 d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="bg-light text-primary rounded p-3">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 class="h6 fw-bold mb-1 text-dark" x-text="session.topic_name"></h3>
                                            <p class="small text-secondary mb-0" x-text="`${session.message_count} messages &bull; ${new Date(session.updated_at).toLocaleString()}`"></p>
                                        </div>
                                    </div>
                                    <button @click.stop="exportSession(session.id)" class="btn btn-light btn-sm text-secondary rounded-circle d-flex align-items-center justify-content-center p-2 opacity-75 hover-opacity-100" title="Export">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                        <template x-if="history.length === 0">
                            <div class="text-center py-5 bg-light rounded-4 border border-dashed text-muted">
                                <p class="fw-medium mb-0">No previous intelligence logs found.</p>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </main>
</div>

<style>
.cursor-pointer { cursor: pointer; }
.card-hover:hover { transform: translateY(-2px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1) !important; border-color: var(--bs-primary) !important; }
.max-w-4xl { max-width: 56rem; margin: 0 auto; }
.max-w-5xl { max-width: 64rem; margin: 0 auto; }
.text-truncate-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
{% endblock %}

{% block extra_scripts %}
<script>
function chatApp() {
    return {
        section: 'topics',
        topics: [],
        currentTopic: null,
        currentSessionId: null,
        messages: [],
        userInput: '',
        isStreaming: false,
        history: [],

        async init() {
            requireAuth();
            await this.loadTopics();
        },

        async loadTopics() {
            const resp = await apiCall("/api/topics");
            this.topics = await resp.json();
        },

        openTopic(topic) {
            this.currentTopic = topic;
            this.currentSessionId = null;
            this.messages = [];
            this.section = 'topics';
            this.$nextTick(() => this.scrollToBottom());
        },

        backToTopics() {
            this.currentTopic = null;
            this.currentSessionId = null;
            this.messages = [];
        },

        async sendMessage() {
            const message = this.userInput.trim();
            if (!message || this.isStreaming) return;

            this.userInput = '';
            this.messages.push({ role: 'user', content: message });
            this.$nextTick(() => this.scrollToBottom());

            this.isStreaming = true;
            const assistantMsg = { role: 'assistant', content: '', sources: [] };
            this.messages.push(assistantMsg);

            const url = `/api/chat?topic_id=${this.currentTopic.id}&message=${encodeURIComponent(message)}${this.currentSessionId ? `&session_id=${this.currentSessionId}` : ''}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` },
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    assistantMsg.content += parsed.content;
                                    this.scrollToBottom();
                                }
                                if (parsed.done && parsed.sources) {
                                    assistantMsg.sources = parsed.sources;
                                }
                                if (parsed.error) {
                                    assistantMsg.content += `\n[Error: ${parsed.error}]`;
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                assistantMsg.content = `Critical Connection Error: ${err.message}`;
            } finally {
                this.isStreaming = false;
                this.scrollToBottom();
            }
        },

        async loadHistory() {
            const resp = await apiCall("/api/chat/history");
            this.history = await resp.json();
        },

        async loadSession(sessionId) {
            const resp = await apiCall(`/api/chat/history/${sessionId}`);
            const messages = await resp.json();
            
            const sessionInfo = this.history.find(s => s.id === sessionId);
            
            this.currentTopic = { id: sessionInfo.topic_id, name: sessionInfo.topic_name };
            this.currentSessionId = sessionId;
            this.messages = messages;
            this.section = 'topics';
            this.$nextTick(() => this.scrollToBottom());
        },

        async exportSession(sessionId) {
            const resp = await apiCall(`/api/chat/history/${sessionId}/export?format=txt`);
            const data = await resp.json();
            const blob = new Blob([data.content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ilin-intel-log-${sessionId}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        },

        scrollToBottom() {
            const container = document.getElementById('messages-container');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }
    }
}
</script>
{% endblock %}
