{% extends "base.html" %}
{% block title %}ILIN - Login{% endblock %}
{% block content %}
<section class="min-vh-100 d-flex align-items-center bg-light" x-data="loginForm()">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card border-0 shadow rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1 class="display-5 fw-bold text-primary mb-1">ILIN</h1>
                            <p class="text-muted text-uppercase tracking-wider small">Integrated Local Intelligence Node</p>
                        </div>

                        <form @submit.prevent="handleSubmit">
                            <div class="mb-3">
                                <label class="form-label fw-semibold text-secondary" for="username">Username</label>
                                <input 
                                    class="form-control form-control-lg bg-light border-0" 
                                    type="text" 
                                    id="username" 
                                    x-model="username" 
                                    placeholder="Enter your username" 
                                    required
                                >
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold text-secondary" for="password">Password</label>
                                <input 
                                    class="form-control form-control-lg bg-light border-0" 
                                    type="password" 
                                    id="password" 
                                    x-model="password" 
                                    placeholder="Enter your password" 
                                    required
                                >
                            </div>

                            <template x-if="errorMessage">
                                <div class="alert alert-danger d-flex align-items-center py-2 px-3 small mb-4" role="alert">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="bi bi-exclamation-triangle-fill flex-shrink-0 me-2" viewBox="0 0 16 16" style="width: 1em; height: 1em;" fill="currentColor">
                                        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                                    </svg>
                                    <span x-text="errorMessage"></span>
                                </div>
                            </template>

                            <div class="d-grid">
                                <button 
                                    type="submit" 
                                    class="btn btn-primary btn-lg fw-bold text-uppercase"
                                    :disabled="loading"
                                >
                                    <span x-show="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                    Sign In
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="mt-4 text-center text-muted small">
                    &copy; 2026 ILIN Node. All systems operational.
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
function loginForm() {
    return {
        username: '',
        password: '',
        errorMessage: '',
        loading: false,
        async handleSubmit() {
            this.loading = true;
            this.errorMessage = '';
            try {
                const data = await login(this.username, this.password);
                if (data.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/chat';
                }
            } catch (err) {
                this.errorMessage = err.message || 'Login failed. Please check your credentials.';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
