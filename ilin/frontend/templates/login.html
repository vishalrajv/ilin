{% extends "base.html" %}
{% block title %}ILIN - Login{% endblock %}
{% block content %}
<section class="hero is-fullheight" x-data="loginForm()">
    <div class="hero-body">
        <div class="container">
            <div class="columns is-centered">
                <div class="column is-4-desktop is-6-tablet">
                    <div class="card bg-slate-800 text-white border-0 shadow-2xl rounded-xl">
                        <div class="card-content p-10">
                            <div class="text-center mb-8">
                                <h1 class="title is-2 has-text-white font-bold tracking-wider">ILIN</h1>
                                <p class="subtitle is-6 has-text-grey-light mt-2 uppercase tracking-widest">Integrated Local Intelligence Node</p>
                            </div>

                            <form @submit.prevent="handleSubmit">
                                <div class="field mb-6">
                                    <label class="label has-text-grey-light font-medium mb-2" for="username">Username</label>
                                    <div class="control">
                                        <input 
                                            class="input bg-slate-700 border-slate-600 text-white focus:border-blue-400 focus:ring-1 focus:ring-blue-400 h-12" 
                                            type="text" 
                                            id="username" 
                                            x-model="username" 
                                            placeholder="Enter your username" 
                                            required
                                        >
                                    </div>
                                </div>

                                <div class="field mb-8">
                                    <label class="label has-text-grey-light font-medium mb-2" for="password">Password</label>
                                    <div class="control">
                                        <input 
                                            class="input bg-slate-700 border-slate-600 text-white focus:border-blue-400 focus:ring-1 focus:ring-blue-400 h-12" 
                                            type="password" 
                                            id="password" 
                                            x-model="password" 
                                            placeholder="Enter your password" 
                                            required
                                        >
                                    </div>
                                </div>

                                <template x-if="errorMessage">
                                    <div class="notification is-danger is-light p-3 mb-6 text-sm flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <span x-text="errorMessage"></span>
                                    </div>
                                </template>

                                <div class="control">
                                    <button 
                                        type="submit" 
                                        class="button is-link is-fullwidth h-12 font-bold uppercase tracking-widest hover:brightness-110 transition-all shadow-lg"
                                        :class="loading ? 'is-loading' : ''"
                                        :disabled="loading"
                                    >
                                        Sign In
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="mt-6 text-center text-slate-500 text-sm">
                        &copy; 2024 ILIN Node. All systems operational.
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
function loginForm() {
    return {
        username: '',
        password: '',
        errorMessage: '',
        loading: false,
        async handleSubmit() {
            this.loading = true;
            this.errorMessage = '';
            try {
                const data = await login(this.username, this.password);
                if (data.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/chat';
                }
            } catch (err) {
                this.errorMessage = err.message || 'Login failed. Please check your credentials.';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
